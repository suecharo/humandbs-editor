services:
  app:
    build: .
    container_name: humandbs-editor
    ports:
      - "127.0.0.1:5173:5173"
      - "127.0.0.1:3001:3001"
    volumes:
      - .:/app:rw
      - node_modules:/app/node_modules:rw
      - ./structured-json:/app/structured-json:ro
    env_file: .env
    init: true

volumes:
  node_modules: {}
